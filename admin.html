<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo - IA Play</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: #f1f5f9;">

    <header style="background: var(--cor-primaria);">
        <div class="logo">
            <h1>⚙️ IA Play - Painel Admin</h1>
        </div>
        <nav id="nav-menu">
            <ul>
                <li><a href="index.html">Voltar para o Site</a></li>
            </ul>
        </nav>
    </header>

    <main style="padding: 40px 20px; max-width: 1200px; margin: 0 auto; min-height: 80vh;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 15px;">
            <h2 style="color: var(--cor-primaria); font-size: 28px; margin: 0;">Gestão de Leads (Pré-Matrículas)</h2>
            
            <div style="display: flex; gap: 10px;">
                <button onclick="carregarLeads()" class="btn-comprar" style="padding: 10px 20px; font-size: 14px;">Atualizar Dados</button>
                <button onclick="sairPainel()" class="btn-acao btn-excluir" style="padding: 10px 20px; font-size: 14px; border-radius: 30px;">Sair</button>
            </div>
        </div>
        
        <div style="overflow-x: auto;">
            <table class="tabela-admin">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>E-mail</th>
                        <th>Módulo de Interesse</th>
                        <th>Demanda Registrada</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="tabela-corpo">
                    </tbody>
            </table>
        </div>
    </main>

    <footer style="margin-top: auto;">
        <p>&copy; 2026 IA Play Cursos - Sistema de Gestão Interna Restrita</p>
    </footer>

    <script>
        const API_URL = 'https://ia-play-cursos.onrender.com/leads';

        // 1. VERIFICAÇÃO DE SEGURANÇA: Checa se o usuário tem o "crachá"
        const token = localStorage.getItem('adminToken');
        if (!token) {
            window.location.href = 'login.html'; // Expulsa para o login se não tiver senha
        }

        // Função para Deslogar
        function sairPainel() {
            localStorage.removeItem('adminToken');
            window.location.href = 'login.html';
        }

        // 2. LER DADOS (Com a senha embutida no cabeçalho)
        async function carregarLeads() {
            try {
                const resposta = await fetch(API_URL, {
                    headers: { 'X-Admin-Token': token } // Enviando o crachá de segurança
                });
                
                // Se o Python barrar (Erro 403), devolve para o login
                if (resposta.status === 403) {
                    alert("Acesso negado: Sessão expirada ou senha inválida.");
                    sairPainel();
                    return;
                }
                
                if (!resposta.ok) throw new Error("Erro ao buscar dados no servidor.");
                
                const leads = await resposta.json();
                const tbody = document.getElementById('tabela-corpo');
                tbody.innerHTML = ''; 
                
                leads.forEach(lead => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td><strong>#${lead.id}</strong></td>
                        <td>${lead.nome}</td>
                        <td>${lead.email}</td>
                        <td><span style="background: #e0e7ff; color: #4338ca; padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 12px;">${lead.modulo_interesse}</span></td>
                        <td style="max-width: 250px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;" title="${lead.descricao_demanda}">${lead.descricao_demanda}</td>
                        <td style="min-width: 150px;">
                            <button class="btn-acao btn-editar" onclick="editarLead(${lead.id}, '${lead.nome}', '${lead.modulo_interesse}')">Editar</button>
                            <button class="btn-acao btn-excluir" onclick="deletarLead(${lead.id})">Excluir</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (erro) {
                console.error(erro);
                alert("Falha ao carregar a tabela. Verifique sua conexão com o servidor.");
            }
        }

        // 3. ATUALIZAR (Com senha)
        async function editarLead(id, nomeAtual, moduloAtual) {
            const novoNome = prompt("Corrigir o nome do lead:", nomeAtual);
            if (!novoNome) return; 

            const novoModulo = prompt("Alterar módulo de interesse:", moduloAtual);
            if (!novoModulo) return; 
            
            try {
                const resposta = await fetch(`${API_URL}/${id}`, {
                    method: 'PUT',
                    headers: { 
                        'Content-Type': 'application/json',
                        'X-Admin-Token': token 
                    },
                    body: JSON.stringify({ 
                        nome: novoNome, 
                        modulo_interesse: novoModulo, 
                        urgencia: 'Normal' 
                    })
                });

                if (resposta.ok) {
                    carregarLeads(); 
                } else if (resposta.status === 403) {
                    alert("Operação bloqueada por segurança.");
                } else {
                    alert("Erro ao editar lead.");
                }
            } catch (erro) {
                console.error(erro);
            }
        }

        // 4. EXCLUIR (Com senha)
        async function deletarLead(id) {
            const confirmacao = confirm(`Atenção: Tem certeza que deseja apagar definitivamente o Lead #${id}?`);
            
            if (confirmacao) {
                try {
                    const resposta = await fetch(`${API_URL}/${id}`, { 
                        method: 'DELETE',
                        headers: { 'X-Admin-Token': token }
                    });
                    
                    if (resposta.ok) {
                        carregarLeads(); 
                    } else if (resposta.status === 403) {
                        alert("Operação bloqueada por segurança.");
                    } else {
                        alert("Erro ao excluir lead.");
                    }
                } catch (erro) {
                    console.error(erro);
                }
            }
        }

        // Assim que a página abre, ele valida o token e chama a tabela
        window.onload = carregarLeads;
    </script>
</body>
</html>
